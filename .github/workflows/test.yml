name: React Vite CI

on:
  push:
    branches: [ dev-cf-vite, main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: yarn install --immutable

    - name: Run Vitest
      run: yarn test
      env:
        VITE_APP_NAME: "Star Path Viewer"
